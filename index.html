<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 聚合站 — AI 工具聚合、MCP 服务、Skills、资讯收藏">
  <title>AI 聚合站 | 工具·MCP·资讯收藏</title>
  <link rel="stylesheet" href="./style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>

<body>
  <div id="app">
    <!-- 侧边栏导航 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">✨</span>
        <span class="brand-text">AI 聚合站</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item" data-tab="dashboard"><span class="nav-icon">📊</span><span
            class="nav-label">总览</span></button>
        <button class="nav-item active" data-tab="news"><span class="nav-icon">🔥</span><span
            class="nav-label">热门资讯</span></button>
        <button class="nav-item" data-tab="mcp"><span class="nav-icon">🛠️</span><span
            class="nav-label">MCP</span></button>
        <button class="nav-item" data-tab="skills"><span class="nav-icon">⚡</span><span
            class="nav-label">Skills</span></button>
        <button class="nav-item" data-tab="resources"><span class="nav-icon">📚</span><span
            class="nav-label">资源合辑</span></button>
        <button class="nav-item" data-tab="saved-news"><span class="nav-icon">📰</span><span
            class="nav-label">资讯收藏</span></button>
        <button class="nav-item" data-tab="journal"><span class="nav-icon">📝</span><span
            class="nav-label">学习日记</span></button>
      </nav>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="zoom-controls">
          <button id="zoom-out" class="zoom-btn" title="缩小 (Ctrl -)">-</button>
          <button id="zoom-reset" class="zoom-btn" title="重置 (Ctrl 0)">🔍</button>
          <button id="zoom-in" class="zoom-btn" title="放大 (Ctrl +)">+</button>
        </div>
        <span class="sidebar-hint">切换主题 & 缩放</span>
      </div>
    </aside>

    <!-- 主内容区 -->
    <div class="main-wrap">
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle"
          onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <span class="topbar-title" id="topbar-title">📊 总览</span>
        <div class="topbar-right">
          <input type="text" id="global-search" class="topbar-search" placeholder="搜索... (Ctrl+K)" />
          <div id="notification-bell" class="notif-bell" onclick="toggleNotifications()">
            <span>🔔</span>
            <span class="notif-badge" id="notif-badge" style="display:none">0</span>
          </div>
        </div>
      </header>

      <main>
        <div class="action-bar" id="action-bar"></div>
        <section id="content-grid" class="content-grid">
          <div class="loading-state">加载中</div>
        </section>
      </main>
    </div>
  </div>

  <!-- 弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">操作</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- 通知面板 -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">🔔 通知中心<button onclick="clearNotifications()">清空</button></div>
    <div class="notif-list" id="notif-list">
      <div class="notif-empty">暂无通知</div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
